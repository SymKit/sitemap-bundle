deptrac:
    paths:
        - ./src
    layers:
        - name: Contract
          collectors:
            - type: directory
              value: src/Contract/.*
        - name: Model
          collectors:
            - type: directory
              value: src/Model/.*
        - name: Event
          collectors:
            - type: directory
              value: src/Event/.*
        - name: Exception
          collectors:
            - type: directory
              value: src/Exception/.*
        - name: Cache
          collectors:
            - type: directory
              value: src/Cache/.*
        - name: Registry
          collectors:
            - type: directory
              value: src/Registry/.*
        - name: Generator
          collectors:
            - type: directory
              value: src/Generator/.*
        - name: Priority
          collectors:
            - type: directory
              value: src/Priority/.*
        - name: Provider
          collectors:
            - type: directory
              value: src/Provider/.*
        - name: EventListener
          collectors:
            - type: directory
              value: src/EventListener/.*
        - name: Controller
          collectors:
            - type: directory
              value: src/Controller/.*
        - name: Command
          collectors:
            - type: directory
              value: src/Command/.*
        - name: DataCollector
          collectors:
            - type: directory
              value: src/DataCollector/.*
        - name: Message
          collectors:
            - type: directory
              value: src/Message/.*
        - name: MessageHandler
          collectors:
            - type: directory
              value: src/MessageHandler/.*
        - name: Notifier
          collectors:
            - type: directory
              value: src/Notifier/.*
        - name: Bundle
          collectors:
            - type: classNameRegex
              value: '/^Symkit\\\\SitemapBundle\\\\SitemapBundle$/'
    ruleset:
        Contract:
            - Model
        Model: []
        Event: []
        Exception: []
        Cache:
            - Contract
        Registry:
            - Contract
            - Exception
        Generator:
            - Contract
            - Exception
            - Model
            - Event
        Priority:
            - Contract
        Provider:
            - Contract
        EventListener:
            - Contract
            - Event
        Controller:
            - Contract
            - Exception
        Command:
            - Contract
        DataCollector:
            - Contract
            - Event
        Message: []
        MessageHandler:
            - Contract
            - Message
        Notifier:
            - Contract
        Bundle:
            - Contract
            - Cache
            - Command
            - Controller
            - DataCollector
            - EventListener
            - Generator
            - MessageHandler
            - Notifier
            - Priority
            - Provider
            - Registry
            - Event
            - Message
